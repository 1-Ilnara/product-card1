<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Users Database</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #333; }

        .controls {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
        }

        #getAllBtn { background-color: #4CAF50; color: white; }
        #getAllBtn:hover { background-color: #45a049; }

        #deleteAllBtn { background-color: #f44336; color: white; }
        #deleteAllBtn:hover { background-color: #da190b; }
        #status {
            font-size: 1.2rem;
            margin: 20px;
            font-weight: 500;
            color: #666;
        }

        .error { color: #d32f2f !important; }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); }

        .card h3 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .card p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: #555;
        }

        .card b { color: #333; }

        .delete-card-btn {
            margin-top: auto;
            background-color: #ff9800;
            color: white;
            padding: 8px;
            font-size: 0.8rem;
        }

        .delete-card-btn:hover { background-color: #e68a00; }
    </style>
</head>
<body>

    <h1>Список пользователей</h1>

    <div class="controls">
        <button id="getAllBtn">Получить всех</button>
        <button id="deleteAllBtn">Удалить всех</button>
    </div>
    <div id="status"></div>
    <div id="container"></div>
    <script src="async.js"></script>
</body>
</html>
